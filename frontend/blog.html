<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
    <div class="container">
        <h1 class="logo">My Portfolio</h1>
        <nav class="nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="blog.html" class="nav-link active">Blog</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="section">
        <h2>Blog Posts</h2>
        <p class="section-subtitle">
            Powered by Spring Boot + MySQL backend and Vanilla JS frontend.
        </p>

        <div id="posts-container" class="posts-list">
            <!-- Posts will be rendered here by app.js -->
        </div>
    </section>

    <section class="section">
        <h2>Create New Post</h2>
        <form id="post-form" class="post-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required maxlength="255" />
            </div>
            <div class="form-group">
                <label for="author">Author</label>
                <input type="text" id="author" name="author" required maxlength="100" />
            </div>
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn-primary">Publish Post</button>
            <p id="form-message" class="form-message"></p>
        </form>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <p>&copy; <span id="year"></span> My Portfolio. All rights reserved.</p>
    </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
